[platformio]
default_envs = native

[env]
build_flags =
  -std=gnu++17
  -Wall
  -Wextra
  -Wpedantic

[env:native]
platform = native
build_flags =
  ${env.build_flags}
  -DDIXPAS_TARGET_NATIVE=1

[env:native_checks]
platform = native
build_flags =
  ${env.build_flags}
  -DDIXPAS_TARGET_NATIVE=1
  -DDIXPAS_NATIVE_CHECKS=1
build_src_filter =
  +<*.cpp>
  -<main.cpp>

[env:nanoevery]
platform = atmelmegaavr
board = nano_every
framework = arduino
build_flags =
  ${env.build_flags}
  -DDIXPAS_TARGET_ARDUINO=1
